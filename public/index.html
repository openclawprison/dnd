<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D&D AI Dungeon Master</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5efe3;--card:#fffbf3;--panel:#ece5d5;--border:#cfc5a8;--border2:#b8ad90;
  --gold:#7a5c1f;--gold-light:#a07a2a;--text:#2a2420;--text2:#3d352a;--dim:#5e5548;--dimr:#7a7268;
  --red:#8a2020;--grn:#2a6a2a;--purp:#5a3a8a;--accent:#b8922e;
  --f1:'Cinzel',Georgia,serif;--f2:'Lora',Georgia,serif;
}
body{font-family:var(--f2);background:var(--bg);color:var(--text);height:100vh;overflow:hidden;font-size:16px}
::-webkit-scrollbar{width:7px}
::-webkit-scrollbar-track{background:var(--panel)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--dim)}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
select{font-family:var(--f2);font-size:1rem;color:var(--text)}
button{font-family:var(--f1);transition:all 0.15s;cursor:pointer}
button:hover:not(:disabled){filter:brightness(1.08)}
button:disabled{opacity:0.45;cursor:default}
input{font-family:var(--f1)}
#app{height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── Creation ── */
.cw{flex:1;display:flex;align-items:center;justify-content:center;padding:1.5rem;overflow-y:auto;background:linear-gradient(180deg,#f8f2e6 0%,#efe5d0 100%)}
.cc{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:2.2rem;max-width:620px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,0.07)}
.ct{font-family:var(--f1);font-size:1.7rem;color:var(--gold);text-align:center;letter-spacing:0.08em;margin-bottom:0.3rem}
.cs{text-align:center;color:var(--dim);font-size:1rem;margin-bottom:1.2rem}
.prog{display:flex;gap:5px;margin-bottom:1.5rem}
.prog div{flex:1;height:4px;border-radius:3px;background:var(--border)}
.prog div.on{background:var(--gold)}
.st{font-family:var(--f1);color:var(--gold);font-weight:600;margin-bottom:0.6rem;font-size:1.1rem}
.og{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:0.6rem;margin-bottom:0.8rem}
.ob{background:var(--card);border:2px solid var(--border);border-radius:10px;padding:0.7rem;cursor:pointer;text-align:center;transition:all 0.15s}
.ob:hover{border-color:var(--gold-light);background:#fdf7ea}
.ob.sel{border-color:var(--gold);background:#f7eed8;box-shadow:0 0 0 1px var(--gold)}
.on_t{font-family:var(--f1);color:var(--gold);font-size:0.95rem;font-weight:600}
.os{color:var(--dim);font-size:0.82rem;margin-top:3px}
.dsc{color:var(--text2);font-size:1rem;font-style:italic;margin-top:0.6rem;line-height:1.5}
.ar{display:flex;align-items:center;gap:0.6rem;padding:0.5rem 0.7rem;background:var(--panel);border-radius:8px;margin-bottom:5px;border:1px solid var(--border)}
.an{font-family:var(--f1);color:var(--gold);width:100px;font-size:0.95rem;font-weight:600}
.as{background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:5px;padding:0.35rem 0.5rem;font-size:1rem}
.ni{width:100%;background:var(--card);border:2px solid var(--border);border-radius:8px;padding:0.8rem;color:var(--gold);font-size:1.2rem;text-align:center;outline:none;letter-spacing:0.05em;margin-bottom:0.8rem}
.ni:focus{border-color:var(--gold)}
.nr{display:flex;justify-content:space-between;margin-top:1.8rem}
.bp{background:linear-gradient(135deg,var(--accent),var(--gold));color:#fff;border:none;border-radius:8px;padding:0.6rem 1.6rem;font-weight:700;font-size:0.95rem;letter-spacing:0.04em}
.bs{background:transparent;color:var(--dim);border:1px solid var(--border);border-radius:8px;padding:0.55rem 1.2rem;font-size:0.92rem}
.br{background:transparent;border:1px dashed var(--border2);border-radius:8px;padding:0.4rem 1.2rem;color:var(--gold);font-size:0.88rem;display:block;margin:0 auto 1.2rem}
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:0.8rem}
.sb{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:0.4rem;text-align:center}
.sb .l{font-size:0.7rem;letter-spacing:0.08em;color:var(--dim);text-transform:uppercase}
.sb .v{font-family:var(--f1);font-size:1.15rem;color:var(--gold);font-weight:700}
.sb .m{font-size:0.82rem;color:var(--text2)}
.rg{display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;font-size:1rem;color:var(--dim);margin-bottom:0.6rem}
.rg span{color:var(--gold);font-weight:600}

/* ── Game ── */
.gw{flex:1;display:flex;overflow:hidden}
.sd{width:260px;min-width:260px;background:var(--panel);border-right:1px solid var(--border);padding:0.9rem;overflow-y:auto;display:flex;flex-direction:column}
.cn{font-family:var(--f1);font-size:1.2rem;color:var(--gold);font-weight:700}
.cx{font-size:0.85rem;color:var(--dim);margin-bottom:0.7rem}
.hr{display:flex;justify-content:space-between;font-size:0.85rem;margin-bottom:3px;color:var(--text2)}
.ht{height:7px;border-radius:4px;background:var(--border);overflow:hidden;margin-bottom:10px}
.hf{height:100%;border-radius:4px;transition:width 0.5s}
.ms{display:flex;gap:5px;margin-bottom:10px}
.mi{flex:1;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:0.3rem;text-align:center}
.mi .l{font-size:0.65rem;letter-spacing:0.06em;color:var(--dim)}
.mi .v{font-family:var(--f1);font-size:1.05rem;color:var(--gold);font-weight:700}
.ag{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:10px}
.ax{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:0.25rem;text-align:center}
.ax .l{font-size:0.6rem;letter-spacing:0.05em;color:var(--dim)}
.ax .v{font-family:var(--f1);font-size:1rem;color:var(--gold);font-weight:700}
.ax .m{font-size:0.78rem;color:var(--text2)}
.sl{font-size:0.75rem;letter-spacing:0.08em;color:var(--dim);margin-bottom:3px;text-transform:uppercase;font-weight:600}
.sv{font-family:var(--f1);color:var(--gold);font-size:1rem}
.si{font-size:0.88rem;color:var(--text2);padding:1px 0}
.le{font-size:0.82rem;padding:2px 0}
.dv{height:1px;background:var(--border);margin:8px 0}
.slt{display:flex;gap:4px;margin-bottom:6px}
.slt span{font-size:1.15rem}
.slt .on{color:var(--gold)}
.slt .off{color:var(--border)}

.mp{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.cb{margin:0.7rem 1.4rem 0;background:linear-gradient(90deg,#f8e2e2,#fcecec,#f8e2e2);border:1px solid #d4a0a0;border-radius:8px;padding:0.5rem 1rem;text-align:center;font-family:var(--f1);color:var(--red);font-weight:700;font-size:0.95rem;letter-spacing:0.06em}
.cf{font-family:var(--f2);font-size:0.85rem;color:#7a4444;font-weight:400;margin-top:3px}
.nar{flex:1;overflow-y:auto;padding:1.4rem 2rem;line-height:1.8;font-size:1.05rem;color:var(--text)}
.dm{margin-bottom:1.1rem;animation:fadeUp 0.3s ease}
.um{background:rgba(90,58,138,0.06);border-radius:10px;padding:0.6rem 1rem;margin-bottom:1.1rem;border-left:4px solid var(--purp);animation:fadeUp 0.3s ease}
.ut{font-family:var(--f1);color:var(--purp);font-size:0.72rem;letter-spacing:0.08em;margin-bottom:4px;font-weight:700}
.stm{padding:1rem 0;font-family:var(--f1);font-size:1rem;color:var(--gold-light);animation:pulse 1.5s infinite}
.opr{display:flex;flex-wrap:wrap;gap:0.5rem;margin-top:0.8rem}
.oc{background:var(--card);border:2px solid var(--border);border-radius:8px;padding:0.45rem 1rem;cursor:pointer;font-family:var(--f1);color:var(--gold);font-size:0.92rem;font-weight:600}
.oc:hover{background:#f5edd5;border-color:var(--gold)}
.ia{border-top:1px solid var(--border);padding:0.7rem 1.4rem;background:var(--panel);display:flex;gap:0.6rem}
.ti{flex:1;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:0.6rem 0.8rem;font-family:var(--f2);color:var(--text);font-size:1rem;outline:none;resize:none}
.ti:focus{border-color:var(--gold)}
.se{background:linear-gradient(135deg,var(--accent),var(--gold));color:#fff;border:none;border-radius:8px;padding:0.5rem 1.1rem;font-weight:700;font-size:1rem;align-self:flex-end}

@media(max-width:700px){
  .sd{width:200px;min-width:200px;padding:0.6rem}
  .nar{padding:1rem 1.2rem}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ══════════════════════════════════════
// DATA
// ══════════════════════════════════════
const RACES={
  Human:{b:{str:1,dex:1,con:1,int:1,wis:1,cha:1},desc:"Versatile and ambitious, humans adapt to any calling.",spd:30},
  Elf:{b:{dex:2},desc:"Graceful and long-lived, with keen senses and a love of nature.",spd:30},
  Dwarf:{b:{con:2},desc:"Stout and sturdy, masters of stone and steel.",spd:25},
  Halfling:{b:{dex:2},desc:"Small but brave, with uncanny luck and nimble reflexes.",spd:25},
  "Half-Orc":{b:{str:2,con:1},desc:"Fierce and enduring, carrying the strength of orcish blood.",spd:30},
  Tiefling:{b:{cha:2,int:1},desc:"Infernal heritage grants cunning charm and dark resilience.",spd:30},
  Dragonborn:{b:{str:2,cha:1},desc:"Draconic warriors with a breath weapon and proud lineage.",spd:30},
};
const CLASSES={
  Fighter:{hd:10,hp0:10,ac:17,sp:false,feat:["Second Wind","Defense +1 AC"],eq:["Longsword","Shield","Chain Mail","Light Crossbow","20 Bolts"]},
  Wizard:{hd:6,hp0:6,ac:10,sp:true,cantrips:["Fire Bolt","Mage Hand","Prestidigitation"],spells:["Magic Missile","Shield","Thunderwave","Mage Armor","Sleep"],slots:2,feat:["Arcane Recovery"],eq:["Quarterstaff","Spellbook","Component Pouch"]},
  Rogue:{hd:8,hp0:8,ac:13,sp:false,feat:["Sneak Attack 1d6","Expertise","Thieves' Cant"],eq:["Rapier","Shortbow","20 Arrows","Leather Armor","Thieves' Tools"]},
  Cleric:{hd:8,hp0:8,ac:18,sp:true,cantrips:["Sacred Flame","Guidance","Thaumaturgy"],spells:["Cure Wounds","Bless","Guiding Bolt","Healing Word"],slots:2,feat:["Turn Undead","Life Domain"],eq:["Mace","Scale Mail","Shield","Holy Symbol"]},
  Ranger:{hd:10,hp0:10,ac:14,sp:false,feat:["Favored Enemy","Natural Explorer","Archery +2"],eq:["Longbow","20 Arrows","Leather Armor","2 Shortswords"]},
  Paladin:{hd:10,hp0:10,ac:16,sp:false,feat:["Divine Sense","Lay on Hands 5hp"],eq:["Longsword","Shield","Chain Mail","Holy Symbol","5 Javelins"]},
};
const ABS=["str","dex","con","int","wis","cha"];
const ABF={str:"Strength",dex:"Dexterity",con:"Constitution",int:"Intelligence",wis:"Wisdom",cha:"Charisma"};
const ARR=[15,14,13,12,10,8];
const mo=s=>Math.floor((s-10)/2);
const fm=s=>{const m=mo(s);return m>=0?"+"+m:""+m;};
const shuffle=a=>{const c=[...a];for(let i=c.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[c[i],c[j]]=[c[j],c[i]];}return c;};
const NAMES=["Aldric","Vexia","Thorn","Mirael","Kragmar","Lysara","Durnok","Faelith","Grimbold","Seraphine","Azrak","Elowen","Mordecai","Nyxara","Theron","Valdris","Isadora","Brom"];

// ── DOM helpers ──
const $=id=>document.getElementById(id);

function el(tag, cls, children) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (children) {
    if (!Array.isArray(children)) children = [children];
    for (const c of children) {
      if (typeof c === "string") e.appendChild(document.createTextNode(c));
      else if (c) e.appendChild(c);
    }
  }
  return e;
}

function btn(text, cls, onclick) {
  const b = document.createElement("button");
  b.className = cls;
  b.textContent = text;
  b.addEventListener("click", onclick);
  return b;
}

// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
let S = {
  screen:"create", step:0, race:"", cls:"", asgn:{str:"",dex:"",con:"",int:"",wis:"",cha:""}, charName:"",
  char:null, msgs:[], log:[], input:"", loading:false, opts:[], combat:false, enemies:[], status:""
};

// ══════════════════════════════════════
// SAVE / LOAD
// ══════════════════════════════════════
const SAVE_KEY = "dnd_ai_dm_save";
function saveGame() {
  try {
    const d = {char:S.char, msgs:S.msgs.slice(-30), log:S.log, combat:S.combat, enemies:S.enemies, opts:S.opts};
    localStorage.setItem(SAVE_KEY, JSON.stringify(d));
  } catch(e) { console.warn("Save failed:", e); }
}
function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false;
    const d = JSON.parse(raw);
    if (!d.char || !d.char.name) return false;
    S.char=d.char; S.msgs=d.msgs||[]; S.log=d.log||[];
    S.combat=d.combat||false; S.enemies=d.enemies||[]; S.opts=d.opts||[];
    S.screen="game";
    return true;
  } catch(e) { return false; }
}
function clearSave() { try { localStorage.removeItem(SAVE_KEY); } catch(e) {} }
function hasSave() {
  try { const r=localStorage.getItem(SAVE_KEY); if(!r)return false; const d=JSON.parse(r); return !!(d.char&&d.char.name); }
  catch(e) { return false; }
}

// ══════════════════════════════════════
// API
// ══════════════════════════════════════
async function askDM(sys, messages, onStatus) {
  onStatus("The Dungeon Master consults ancient tomes...");
  const res = await fetch("/api/dm", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({system: sys, messages: messages})
  });
  onStatus("Reading the scrolls...");
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || "API error " + res.status);
  return data;
}

// ══════════════════════════════════════
// HELPERS
// ══════════════════════════════════════
function bon(a) { return S.race ? (RACES[S.race].b[a]||0) : 0; }
function fin(a) { return (S.asgn[a]!=="" ? Number(S.asgn[a]) : 10) + bon(a); }
function avail(ab) {
  const used = ABS.filter(a=>a!==ab).map(a=>S.asgn[a]).filter(v=>v!=="").map(Number);
  const pool = [...ARR];
  for (const v of used) { const i=pool.indexOf(v); if(i!==-1) pool.splice(i,1); }
  return [...new Set(pool)].sort((a,b)=>b-a);
}

// ══════════════════════════════════════
// RENDER
// ══════════════════════════════════════
function render() {
  const app = $("app");
  app.innerHTML = "";
  if (S.screen === "resume") renderResume(app);
  else if (S.screen === "create") renderCreation(app);
  else renderGame(app);
}

// ── Resume Screen ──
function renderResume(app) {
  const wrap = el("div","cw");
  const card = el("div","cc");
  card.style.textAlign = "center";
  card.appendChild(el("div","ct",["⚔ D&D AI Dungeon Master ⚔"]));

  let info = "";
  try { const d=JSON.parse(localStorage.getItem(SAVE_KEY)); info=d.char.name+" — "+d.char.race+" "+d.char.class+" (Level "+d.char.level+", HP "+d.char.hp+"/"+d.char.maxHp+")"; } catch(e){}
  if (info) {
    const p = el("div","",[ info ]);
    p.style.cssText = "color:var(--text2);font-size:1.05rem;margin:1.2rem 0 0.4rem";
    card.appendChild(p);
  }

  const sub = el("div","",["A saved quest was found."]);
  sub.style.cssText = "color:var(--dim);font-size:1rem;margin:0.5rem 0 1.8rem";
  card.appendChild(sub);

  const b1 = btn("⚔ Continue Quest", "bp", () => { loadGame(); render(); });
  b1.style.cssText = "display:block;width:100%;padding:0.8rem;font-size:1.05rem;margin-bottom:0.8rem";
  card.appendChild(b1);

  const b2 = btn("🗡 New Adventure", "bs", () => { clearSave(); S.screen="create"; render(); });
  b2.style.cssText = "display:block;width:100%;padding:0.7rem;font-size:1rem";
  card.appendChild(b2);

  wrap.appendChild(card);
  app.appendChild(wrap);
}

// ── Creation Screen ──
function renderCreation(app) {
  const allSet = ABS.every(a => S.asgn[a] !== "");
  const ok = S.step===0?!!S.race : S.step===1?!!S.cls : S.step===2?allSet : S.charName.trim().length>0;

  const wrap = el("div","cw");
  const card = el("div","cc");

  card.appendChild(el("div","ct",["⚔ Forge Thy Hero ⚔"]));
  card.appendChild(el("div","cs",["Step "+(S.step+1)+" of 4 — "+["Race","Class","Abilities","Review"][S.step]]));

  // Progress bar
  const prog = el("div","prog");
  for (let i=0;i<4;i++) { const d=document.createElement("div"); if(i<=S.step) d.className="on"; prog.appendChild(d); }
  card.appendChild(prog);

  // Randomize all
  card.appendChild(btn("🎲 Randomize Everything", "br", () => {
    const rk=Object.keys(RACES),ck=Object.keys(CLASSES);
    S.race=rk[Math.floor(Math.random()*rk.length)];
    S.cls=ck[Math.floor(Math.random()*ck.length)];
    const sh=shuffle([...ARR]); ABS.forEach((a,i)=>{S.asgn[a]=String(sh[i]);});
    S.charName=NAMES[Math.floor(Math.random()*NAMES.length)];
    S.step=3; render();
  }));

  // ── Step 0: Race ──
  if (S.step===0) {
    card.appendChild(el("div","st",["Choose Thy Race"]));
    const grid = el("div","og");
    for (const r of Object.keys(RACES)) {
      const b = el("div","ob"+(S.race===r?" sel":""));
      b.appendChild(el("div","on_t",[r]));
      b.appendChild(el("div","os",[Object.entries(RACES[r].b).map(([a,v])=>"+"+v+" "+a.toUpperCase()).join(", ")]));
      b.addEventListener("click",()=>{ S.race=r; render(); });
      grid.appendChild(b);
    }
    card.appendChild(grid);
    if (S.race) card.appendChild(el("div","dsc",[RACES[S.race].desc]));
  }

  // ── Step 1: Class ──
  if (S.step===1) {
    card.appendChild(el("div","st",["Choose Thy Calling"]));
    const grid = el("div","og");
    for (const c of Object.keys(CLASSES)) {
      const b = el("div","ob"+(S.cls===c?" sel":""));
      b.appendChild(el("div","on_t",[c]));
      b.appendChild(el("div","os",["d"+CLASSES[c].hd+" Hit Die"]));
      b.addEventListener("click",()=>{ S.cls=c; render(); });
      grid.appendChild(b);
    }
    card.appendChild(grid);
    if (S.cls) card.appendChild(el("div","dsc",["Features: "+CLASSES[S.cls].feat.join(" • ")]));
  }

  // ── Step 2: Abilities ──
  if (S.step===2) {
    card.appendChild(el("div","st",["Assign Thy Abilities"]));
    const sub = el("div","",["Standard Array: "+ARR.join(", ")]);
    sub.style.cssText = "color:var(--dim);font-size:0.95rem;margin-bottom:0.6rem";
    card.appendChild(sub);
    card.appendChild(btn("🎲 Randomize Stats","br",()=>{
      const sh=shuffle([...ARR]); ABS.forEach((a,i)=>{S.asgn[a]=String(sh[i]);}); render();
    }));

    for (const a of ABS) {
      const row = el("div","ar");
      row.appendChild(el("span","an",[ABF[a]]));

      const sel = document.createElement("select");
      sel.className = "as";
      sel.innerHTML = '<option value="">—</option>';
      for (const v of avail(a)) {
        const opt = document.createElement("option");
        opt.value = String(v); opt.textContent = String(v);
        if (String(v) === S.asgn[a]) opt.selected = true;
        sel.appendChild(opt);
      }
      sel.addEventListener("change", (function(ability){ return function(e){ S.asgn[ability]=e.target.value; render(); }; })(a));
      row.appendChild(sel);

      if (S.asgn[a]!=="" && bon(a)>0) {
        const bs = el("span","",[ "+"+bon(a) ]);
        bs.style.cssText = "color:var(--grn);font-size:0.9rem;font-weight:600";
        row.appendChild(bs);
      }
      if (S.asgn[a]!=="") {
        const fs = el("span","",[ fin(a)+" ("+fm(fin(a))+")" ]);
        fs.style.cssText = "font-family:var(--f1);color:var(--text);font-weight:700;margin-left:auto;font-size:1rem";
        row.appendChild(fs);
      }
      card.appendChild(row);
    }
  }

  // ── Step 3: Review ──
  if (S.step===3) {
    card.appendChild(el("div","st",["Name Thy Champion"]));
    const inp = document.createElement("input");
    inp.className = "ni";
    inp.value = S.charName;
    inp.maxLength = 30;
    inp.placeholder = "Enter name...";
    inp.addEventListener("input", (e) => { S.charName = e.target.value; });
    card.appendChild(inp);

    const rg = el("div","rg");
    rg.innerHTML = '<div>Race: <span>'+S.race+'</span></div><div>Class: <span>'+S.cls+'</span></div>';
    card.appendChild(rg);

    const sg = el("div","sg");
    for (const a of ABS) {
      const box = el("div","sb");
      box.innerHTML = '<div class="l">'+a.toUpperCase()+'</div><div class="v">'+fin(a)+'</div><div class="m">'+fm(fin(a))+'</div>';
      sg.appendChild(box);
    }
    card.appendChild(sg);
  }

  // ── Nav buttons ──
  const nav = el("div","nr");
  if (S.step > 0) {
    nav.appendChild(btn("← Back","bs",()=>{ S.step--; render(); }));
  } else {
    nav.appendChild(document.createElement("div"));
  }

  if (S.step < 3) {
    const nb = btn("Next →","bp",()=>{ if(ok){ S.step++; render(); } });
    if (!ok) nb.disabled = true;
    nav.appendChild(nb);
  } else {
    const nb = btn("⚔ Begin Quest ⚔","bp",()=>{
      if (!ok) return;
      const c=CLASSES[S.cls], ab={};
      ABS.forEach(a=>{ ab[a]=fin(a); });
      const cm=mo(ab.con), dm=mo(ab.dex);
      let ac=c.ac; if(S.cls==="Wizard")ac=10+dm; if(S.cls==="Rogue")ac=12+dm; if(S.cls==="Ranger")ac=12+Math.min(dm,2);
      S.char={name:S.charName.trim(),race:S.race,class:S.cls,level:1,xp:0,hp:c.hp0+cm,maxHp:c.hp0+cm,ac,ab,prof:2,
        spd:RACES[S.race].spd,feat:c.feat,sp:c.sp,cantrips:c.cantrips||[],spells:c.spells||[],
        sMax:c.slots||0,sUsed:0,inv:[...c.eq],gold:10+Math.floor(Math.random()*100),cond:[]};
      S.screen="game"; render(); startGame();
    });
    if (!ok) nb.disabled = true;
    nav.appendChild(nb);
  }
  card.appendChild(nav);
  wrap.appendChild(card);
  app.appendChild(wrap);

  // Auto-focus name input
  if (S.step===3) setTimeout(()=>{ const i=document.querySelector(".ni"); if(i) i.focus(); },50);
}

// ══════════════════════════════════════
// GAME
// ══════════════════════════════════════
async function startGame() { await callDMAction("",true); }

async function callDMAction(userMsg, isInit) {
  const ch=S.char, en=S.enemies, inC=S.combat;
  S.loading=true; S.opts=[]; render();

  const sys=`You are a D&D 5e DM. Medieval tone. Max 2 short paragraphs. Be vivid but concise.
PC:${ch.name} ${ch.race} ${ch.class} Lv${ch.level} HP:${ch.hp}/${ch.maxHp} AC:${ch.ac}
STR${ch.ab.str} DEX${ch.ab.dex} CON${ch.ab.con} INT${ch.ab.int} WIS${ch.ab.wis} CHA${ch.ab.cha}
Feats:${ch.feat.join(",")}
${ch.sp?"Spells:"+ch.spells.join(",")+",Slots:"+(ch.sMax-ch.sUsed):""}
Gear:${ch.inv.join(",")},Gold:${ch.gold}
${en.length?"Foes:"+en.map(e=>e.name+" "+e.hp+"/"+e.maxHp+"hp AC"+e.ac).join("; "):""}
${inC?"IN COMBAT":"EXPLORING"}
Show dice:[d20:14+5=19 vs AC15 HIT]. Use 5e rules.
Reply ONLY JSON:{"narrative":"story","log":[{"type":"combat","text":"x"}],"changes":{"hpChange":0,"goldChange":0,"addItems":[],"removeItems":[],"xp":0,"slotUsed":false,"combat":false,"enemies":[],"addConditions":[],"removeConditions":[]},"options":["A","B","C"]}`;

  const apiMsgs = isInit
    ? [{role:"user",content:"Begin a dramatic medieval D&D adventure opening scene!"}]
    : [...S.msgs.slice(-8).map(m=>({role:m.role,content:m.text})),{role:"user",content:userMsg}];

  try {
    const parsed = await askDM(sys, apiMsgs, s=>{ S.status=s; render(); });
    S.status="";
    const sc = parsed.changes||{};
    if(sc.hpChange) ch.hp=Math.max(0,Math.min(ch.maxHp,ch.hp+sc.hpChange));
    if(sc.goldChange) ch.gold=Math.max(0,ch.gold+sc.goldChange);
    if(sc.addItems?.length) ch.inv.push(...sc.addItems);
    if(sc.removeItems?.length) ch.inv=ch.inv.filter(x=>!sc.removeItems.includes(x));
    if(sc.xp) ch.xp+=sc.xp;
    if(sc.slotUsed && ch.sUsed<ch.sMax) ch.sUsed++;
    if(sc.addConditions?.length) ch.cond=[...new Set([...ch.cond,...sc.addConditions])];
    if(sc.removeConditions?.length) ch.cond=ch.cond.filter(x=>!sc.removeConditions.includes(x));
    if(sc.combat!==undefined) S.combat=sc.combat;
    if(sc.enemies) S.enemies=sc.enemies;
    if(parsed.log?.length) S.log=S.log.concat(parsed.log).slice(-50);
    if(!isInit) S.msgs.push({role:"user",text:userMsg});
    S.msgs.push({role:"assistant",text:parsed.narrative||"The DM nods silently..."});
    S.opts=parsed.options||["Look around","Move forward","Check inventory"];
    saveGame();
  } catch(err) {
    S.status="";
    S.msgs.push({role:"assistant",text:"⚠ "+err.message});
    S.opts=["Retry"];
  }
  S.loading=false;
  render();
  setTimeout(()=>{ const n=document.querySelector(".nar"); if(n) n.scrollTop=n.scrollHeight; },60);
}

function handleAction(text) {
  if(text==="Start Over"){clearSave();location.reload();return;}
  if(text==="Retry"){S.msgs=S.msgs.filter(m=>!m.text.startsWith("⚠"));callDMAction("",true);return;}
  S.input="";
  callDMAction(text,false);
}

// ── Game Screen ──
function renderGame(app) {
  const ch = S.char;
  const hp = ch.maxHp>0?(ch.hp/ch.maxHp)*100:0;
  const wrap = el("div","gw");

  // ── Sidebar ──
  const sb = el("div","sd");
  sb.appendChild(el("div","cn",[ch.name]));
  sb.appendChild(el("div","cx",[ch.race+" "+ch.class+" • Level "+ch.level]));

  // HP
  const hpRow = el("div","hr");
  hpRow.innerHTML = '<span>Hit Points</span><span style="color:'+(hp>50?"var(--grn)":hp>25?"var(--gold)":"var(--red)")+'">'+ch.hp+'<span style="color:var(--border)">/'+ch.maxHp+'</span></span>';
  sb.appendChild(hpRow);
  const hpTrack = el("div","ht");
  const hpFill = document.createElement("div");
  hpFill.className="hf";
  hpFill.style.width=hp+"%";
  hpFill.style.background=hp>50?"var(--grn)":hp>25?"var(--gold)":"var(--red)";
  hpTrack.appendChild(hpFill);
  sb.appendChild(hpTrack);

  // Mini stats
  const ms = el("div","ms");
  for(const[l,v] of [["AC",ch.ac],["SPD",ch.spd],["PROF","+"+ch.prof]]){
    const d=el("div","mi");
    d.innerHTML='<div class="l">'+l+'</div><div class="v">'+v+'</div>';
    ms.appendChild(d);
  }
  sb.appendChild(ms);

  // Abilities
  const ag = el("div","ag");
  for(const a of ABS){
    const d=el("div","ax");
    d.innerHTML='<div class="l">'+a.toUpperCase()+'</div><div class="v">'+ch.ab[a]+'</div><div class="m">'+fm(ch.ab[a])+'</div>';
    ag.appendChild(d);
  }
  sb.appendChild(ag);

  // Spell slots
  if(ch.sp){
    sb.appendChild(el("div","sl",["Spell Slots"]));
    const sl=el("div","slt");
    for(let i=0;i<ch.sMax;i++){
      const sp=document.createElement("span");
      sp.className=i<(ch.sMax-ch.sUsed)?"on":"off";
      sp.textContent="◆";
      sl.appendChild(sp);
    }
    sb.appendChild(sl);
  }

  sb.appendChild(el("div","dv"));
  sb.appendChild(el("div","sl",["Gold"]));
  sb.appendChild(el("div","sv",[ch.gold+" gp"]));
  const xpL=el("div","sl",["Experience"]); xpL.style.marginTop="6px"; sb.appendChild(xpL);
  const xpV=el("div","",[ ch.xp+"/300" ]); xpV.style.cssText="color:var(--text2);font-size:0.9rem"; sb.appendChild(xpV);
  sb.appendChild(el("div","dv"));
  sb.appendChild(el("div","sl",["Equipment"]));
  for(const item of ch.inv) sb.appendChild(el("div","si",["• "+item]));

  // Log
  if(S.log.length){
    const lw=document.createElement("div");
    lw.style.cssText="margin-top:auto;padding-top:8px";
    lw.appendChild(el("div","dv"));
    lw.appendChild(el("div","sl",["Chronicle"]));
    for(const l of S.log.slice(-6)){
      const e=el("div","le",[l.text]);
      e.style.color=l.type==="combat"?"var(--red)":l.type==="heal"?"var(--grn)":"var(--dim)";
      lw.appendChild(e);
    }
    sb.appendChild(lw);
  }
  wrap.appendChild(sb);

  // ── Main Panel ──
  const mp = el("div","mp");

  // Combat banner
  if(S.combat){
    const cb=el("div","cb");
    let html="⚔ COMBAT ⚔";
    if(S.enemies.length) html+='<div class="cf">'+S.enemies.map(e=>e.name+": "+e.hp+"/"+e.maxHp+"hp AC"+e.ac).join(" • ")+'</div>';
    cb.innerHTML=html;
    mp.appendChild(cb);
  }

  // Narrative
  const nar = el("div","nar");
  if(!S.msgs.length && !S.loading && !S.status){
    const ph=el("div","",["Thy quest awaits..."]);
    ph.style.cssText="color:var(--dim);text-align:center;margin-top:3rem;font-family:var(--f1);font-size:1.1rem";
    nar.appendChild(ph);
  }
  for(const m of S.msgs){
    if(m.role==="user"){
      const d=el("div","um");
      d.appendChild(el("div","ut",["THY ACTION"]));
      const t=el("div","",[ m.text ]); t.style.whiteSpace="pre-wrap"; t.style.color="var(--text)";
      d.appendChild(t);
      nar.appendChild(d);
    } else {
      const d=el("div","dm");
      d.style.whiteSpace="pre-wrap";
      d.textContent=m.text;
      nar.appendChild(d);
    }
  }
  if(S.loading||S.status){
    nar.appendChild(el("div","stm",[S.status||"The DM weaves fate..."]));
  }
  if(!S.loading && S.opts.length){
    const or=el("div","opr");
    for(const o of S.opts){
      or.appendChild(btn(o,"oc",()=>handleAction(o)));
    }
    nar.appendChild(or);
  }
  mp.appendChild(nar);

  // Input area
  const ia = el("div","ia");
  const ta = document.createElement("textarea");
  ta.className="ti"; ta.rows=2; ta.placeholder="Declare thy action...";
  ta.value=S.input;
  if(S.loading) ta.disabled=true;
  ta.addEventListener("input",(e)=>{ S.input=e.target.value; });
  ta.addEventListener("keydown",(e)=>{ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();doSubmit();} });
  ia.appendChild(ta);

  const sb2=btn("⚔","se",doSubmit);
  if(S.loading) sb2.disabled=true;
  ia.appendChild(sb2);
  mp.appendChild(ia);

  wrap.appendChild(mp);
  app.appendChild(wrap);

  // Scroll to bottom
  setTimeout(()=>{ const n=document.querySelector(".nar"); if(n) n.scrollTop=n.scrollHeight; },30);
}

function doSubmit(){
  const t=S.input.trim();
  if(t&&!S.loading){ S.input=""; callDMAction(t,false); }
}

// ══════════════════════════════════════
// BOOT
// ══════════════════════════════════════
if (hasSave()) {
  S.screen = "resume";
}
render();
</script>
</body>
</html>
