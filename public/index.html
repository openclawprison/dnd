<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D&D AI Dungeon Master</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5efe3;--card:#fffbf3;--panel:#ece5d5;--border:#cfc5a8;--border2:#b8ad90;
  --gold:#7a5c1f;--goldlt:#a07a2a;--text:#2a2420;--text2:#3d352a;--dim:#5e5548;--dimr:#7a7268;
  --red:#8a2020;--grn:#2a6a2a;--purp:#5a3a8a;--accent:#b8922e;--blue:#2a5a8a;
  --f1:'Cinzel',Georgia,serif;--f2:'Lora',Georgia,serif;
}
body{font-family:var(--f2);background:var(--bg);color:var(--text);height:100vh;overflow:hidden;font-size:16px}
::-webkit-scrollbar{width:7px}
::-webkit-scrollbar-track{background:var(--panel)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes diceRoll{0%{transform:rotate(0deg) scale(1)}25%{transform:rotate(90deg) scale(1.2)}50%{transform:rotate(180deg) scale(1)}75%{transform:rotate(270deg) scale(1.2)}100%{transform:rotate(360deg) scale(1)}}
@keyframes diceGlow{0%,100%{box-shadow:0 0 10px rgba(184,146,46,0.3)}50%{box-shadow:0 0 25px rgba(184,146,46,0.7)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
select,input,textarea{font-family:var(--f2);font-size:1rem;color:var(--text)}
button{font-family:var(--f1);transition:all 0.15s;cursor:pointer}
button:hover:not(:disabled){filter:brightness(1.08)}
button:disabled{opacity:0.4;cursor:default}
#app{height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* Shared */
.wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:1.5rem;overflow-y:auto;background:linear-gradient(180deg,#f8f2e6 0%,#efe5d0 100%)}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:2.2rem;max-width:640px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,0.07)}
.title{font-family:var(--f1);font-size:1.6rem;color:var(--gold);text-align:center;letter-spacing:0.08em;margin-bottom:0.3rem}
.sub{text-align:center;color:var(--dim);font-size:1rem;margin-bottom:1.2rem}
.prog{display:flex;gap:5px;margin-bottom:1.5rem}
.prog div{flex:1;height:4px;border-radius:3px;background:var(--border)}
.prog .on{background:var(--gold)}
.sec{font-family:var(--f1);color:var(--gold);font-weight:600;margin-bottom:0.6rem;font-size:1.1rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:0.6rem;margin-bottom:0.8rem}
.opt{background:var(--card);border:2px solid var(--border);border-radius:10px;padding:0.7rem;cursor:pointer;text-align:center;transition:all 0.15s}
.opt:hover{border-color:var(--goldlt);background:#fdf7ea}
.opt.sel{border-color:var(--gold);background:#f7eed8;box-shadow:0 0 0 1px var(--gold)}
.opt .n{font-family:var(--f1);color:var(--gold);font-size:0.95rem;font-weight:600}
.opt .s{color:var(--dim);font-size:0.82rem;margin-top:3px}
.desc{color:var(--text2);font-size:1rem;font-style:italic;margin-top:0.6rem;line-height:1.5}
.row{display:flex;align-items:center;gap:0.6rem;padding:0.5rem 0.7rem;background:var(--panel);border-radius:8px;margin-bottom:5px;border:1px solid var(--border)}
.inp{width:100%;background:var(--card);border:2px solid var(--border);border-radius:8px;padding:0.7rem;outline:none}
.inp:focus{border-color:var(--gold)}
.nav{display:flex;justify-content:space-between;margin-top:1.8rem}
.bp{background:linear-gradient(135deg,var(--accent),var(--gold));color:#fff;border:none;border-radius:8px;padding:0.6rem 1.6rem;font-weight:700;font-size:0.95rem}
.bs{background:transparent;color:var(--dim);border:1px solid var(--border);border-radius:8px;padding:0.55rem 1.2rem;font-size:0.92rem}
.br{background:transparent;border:1px dashed var(--border2);border-radius:8px;padding:0.4rem 1.2rem;color:var(--gold);font-size:0.88rem;display:block;margin:0 auto 1.2rem}
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.sbox{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:0.4rem;text-align:center}
.sbox .l{font-size:0.7rem;letter-spacing:0.08em;color:var(--dim);text-transform:uppercase}
.sbox .v{font-family:var(--f1);font-size:1.15rem;color:var(--gold);font-weight:700}
.sbox .m{font-size:0.82rem;color:var(--text2)}
.dv{height:1px;background:var(--border);margin:8px 0}

/* Save Slots */
.slot{background:var(--card);border:2px solid var(--border);border-radius:12px;padding:1rem;margin-bottom:0.8rem;cursor:pointer;transition:all 0.15s}
.slot:hover{border-color:var(--goldlt);background:#fdf7ea}
.slot .nm{font-family:var(--f1);color:var(--gold);font-size:1.05rem;font-weight:600}
.slot .info{color:var(--text2);font-size:0.9rem;margin-top:3px}
.slot .empty{color:var(--dimr);font-style:italic;font-size:1rem}
.slot-actions{display:flex;gap:0.5rem;margin-top:0.6rem}
.slot-del{background:transparent;border:1px solid var(--red);color:var(--red);border-radius:6px;padding:0.2rem 0.6rem;font-size:0.78rem;font-family:var(--f2)}

/* Game Layout */
.gw{flex:1;display:flex;overflow:hidden}
.sd{width:270px;min-width:270px;background:var(--panel);border-right:1px solid var(--border);padding:0.9rem;overflow-y:auto;display:flex;flex-direction:column}
.mp{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.nar{flex:1;overflow-y:auto;padding:1.4rem 2rem;line-height:1.8;font-size:1.05rem;color:var(--text)}
.ia{border-top:1px solid var(--border);padding:0.7rem 1.4rem;background:var(--panel);display:flex;gap:0.6rem}
.ti{flex:1;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:0.6rem 0.8rem;font-size:1rem;outline:none;resize:none}
.ti:focus{border-color:var(--gold)}

/* Sidebar elements */
.cn{font-family:var(--f1);font-size:1.2rem;color:var(--gold);font-weight:700}
.cx{font-size:0.85rem;color:var(--dim);margin-bottom:0.7rem}
.label{font-size:0.75rem;letter-spacing:0.08em;color:var(--dim);margin-bottom:3px;text-transform:uppercase;font-weight:600}
.val{font-family:var(--f1);color:var(--gold);font-size:1rem}
.item{font-size:0.88rem;color:var(--text2);padding:1px 0}
.minirow{display:flex;gap:5px;margin-bottom:10px}
.mini{flex:1;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:0.3rem;text-align:center}
.mini .l{font-size:0.65rem;letter-spacing:0.06em;color:var(--dim)}
.mini .v{font-family:var(--f1);font-size:1.05rem;color:var(--gold);font-weight:700}
.abgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:10px}
.abbox{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:0.25rem;text-align:center}
.abbox .l{font-size:0.6rem;letter-spacing:0.05em;color:var(--dim)}
.abbox .v{font-family:var(--f1);font-size:1rem;color:var(--gold);font-weight:700}
.abbox .m{font-size:0.78rem;color:var(--text2)}
.slots-row{display:flex;gap:4px;margin-bottom:6px}
.slots-row span{font-size:1.15rem}
.slots-row .on{color:var(--gold)}
.slots-row .off{color:var(--border)}

/* Powers panel */
.powers{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:0.5rem;margin-bottom:8px}
.power{font-size:0.82rem;color:var(--text2);padding:2px 0}
.spell{font-size:0.82rem;color:var(--purp);padding:1px 0}
.cantrip{font-size:0.82rem;color:var(--blue);padding:1px 0}

/* Rest buttons */
.rest-row{display:flex;gap:4px;margin-bottom:8px}
.rest-btn{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:0.25rem 0.6rem;font-size:0.78rem;color:var(--dim);font-family:var(--f2)}
.rest-btn:hover{border-color:var(--gold);color:var(--gold)}

/* Messages */
.dm-msg{margin-bottom:1.1rem;animation:fadeUp 0.3s ease}
.user-msg{background:rgba(90,58,138,0.06);border-radius:10px;padding:0.6rem 1rem;margin-bottom:1.1rem;border-left:4px solid var(--purp);animation:fadeUp 0.3s ease}
.user-tag{font-family:var(--f1);color:var(--purp);font-size:0.72rem;letter-spacing:0.08em;margin-bottom:4px;font-weight:700}
.status{padding:1rem 0;font-family:var(--f1);font-size:1rem;color:var(--goldlt);animation:pulse 1.5s infinite}
.opts{display:flex;flex-wrap:wrap;gap:0.5rem;margin-top:0.8rem}
.optbtn{background:var(--card);border:2px solid var(--border);border-radius:8px;padding:0.45rem 1rem;font-family:var(--f1);color:var(--gold);font-size:0.92rem;font-weight:600}
.optbtn:hover{background:#f5edd5;border-color:var(--gold)}

/* Dice UI */
.dice-panel{background:linear-gradient(135deg,#fdf7ea,#f5edd5);border:2px solid var(--accent);border-radius:14px;padding:1.2rem;margin:1rem 0;text-align:center;animation:slideDown 0.4s ease}
.dice-desc{font-family:var(--f1);color:var(--text);font-size:1rem;margin-bottom:0.3rem}
.dice-target{color:var(--dim);font-size:0.95rem;margin-bottom:1rem}
.dice-btn{width:90px;height:90px;border-radius:14px;border:3px solid var(--accent);background:var(--card);font-family:var(--f1);font-size:2rem;color:var(--gold);cursor:pointer;animation:diceGlow 2s infinite;transition:all 0.2s;display:inline-flex;align-items:center;justify-content:center}
.dice-btn:hover{transform:scale(1.08);background:#f5edd5}
.dice-btn.rolling{animation:diceRoll 0.4s ease;pointer-events:none}
.dice-result{margin-top:1rem;animation:fadeUp 0.3s ease}
.dice-roll-num{font-family:var(--f1);font-size:2.5rem;font-weight:700;margin:0.3rem 0}
.dice-roll-num.hit{color:var(--grn)}
.dice-roll-num.miss{color:var(--red)}
.dice-roll-num.crit{color:var(--accent);text-shadow:0 0 10px rgba(184,146,46,0.5)}
.dice-detail{color:var(--dim);font-size:0.95rem}
.dice-outcome{font-family:var(--f1);font-size:1.1rem;margin-top:0.4rem;font-weight:600}
.dice-outcome.hit{color:var(--grn)}
.dice-outcome.miss{color:var(--red)}

/* Death saves */
.death-panel{background:linear-gradient(135deg,#fce8e8,#f8d8d8);border:2px solid #d4a0a0;border-radius:14px;padding:1rem;margin-bottom:10px;text-align:center}
.death-title{font-family:var(--f1);color:var(--red);font-size:1rem;letter-spacing:0.06em;margin-bottom:0.5rem}
.death-row{display:flex;justify-content:center;gap:1.2rem}
.death-saves{display:flex;gap:4px;align-items:center}
.death-saves .label{font-size:0.8rem;margin-right:4px;margin-bottom:0}
.death-dot{width:18px;height:18px;border-radius:50%;border:2px solid}
.death-dot.succ{border-color:var(--grn)}
.death-dot.fail{border-color:var(--red)}
.death-dot.filled.succ{background:var(--grn)}
.death-dot.filled.fail{background:var(--red)}

/* Level up */
.lvlup{background:linear-gradient(135deg,#fdf7ea,#f0e5c5);border:2px solid var(--accent);border-radius:14px;padding:1.2rem;margin-bottom:10px;text-align:center;animation:slideDown 0.4s ease}
.lvlup-title{font-family:var(--f1);color:var(--gold);font-size:1.2rem;letter-spacing:0.06em;margin-bottom:0.5rem}

/* Combat banner */
.combat{margin:0.7rem 1.4rem 0;background:linear-gradient(90deg,#f8e2e2,#fcecec,#f8e2e2);border:1px solid #d4a0a0;border-radius:8px;padding:0.5rem 1rem;text-align:center;font-family:var(--f1);color:var(--red);font-weight:700;font-size:0.95rem}
.combat .foes{font-family:var(--f2);font-size:0.85rem;color:#7a4444;font-weight:400;margin-top:3px}

/* NPC list */
.npc{font-size:0.82rem;color:var(--purp);padding:1px 0}

/* Level up bar */
.xpbar{height:6px;border-radius:3px;background:var(--border);overflow:hidden;margin:3px 0 6px}
.xpfill{height:100%;border-radius:3px;background:var(--accent);transition:width 0.5s}

@media(max-width:750px){
  .sd{width:210px;min-width:210px;padding:0.6rem}
  .nar{padding:1rem 1.2rem}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ══════════════════════════════
// DATA
// ══════════════════════════════
const RACES={
  Human:{b:{str:1,dex:1,con:1,int:1,wis:1,cha:1},desc:"Versatile and ambitious, humans adapt to any calling.",spd:30},
  Elf:{b:{dex:2},desc:"Graceful and long-lived, with keen senses.",spd:30},
  Dwarf:{b:{con:2},desc:"Stout and sturdy, masters of stone and steel.",spd:25},
  Halfling:{b:{dex:2},desc:"Small but brave, with uncanny luck.",spd:25},
  "Half-Orc":{b:{str:2,con:1},desc:"Fierce and enduring, carrying orcish blood.",spd:30},
  Tiefling:{b:{cha:2,int:1},desc:"Infernal heritage grants cunning charm.",spd:30},
  Dragonborn:{b:{str:2,cha:1},desc:"Draconic warriors with proud lineage.",spd:30},
};
const CLASSES={
  Fighter:{hd:10,hp0:10,ac:17,sp:false,feat:["Second Wind (heal 1d10+lvl, 1/rest)","Defense +1 AC","Action Surge (extra action, 1/rest)"],eq:["Longsword","Shield","Chain Mail","Light Crossbow","20 Bolts"]},
  Wizard:{hd:6,hp0:6,ac:10,sp:true,cantrips:["Fire Bolt","Mage Hand","Prestidigitation"],spells:["Magic Missile","Shield","Thunderwave","Mage Armor","Sleep"],slots:2,feat:["Arcane Recovery (recover slots on short rest)"],eq:["Quarterstaff","Spellbook","Component Pouch"]},
  Rogue:{hd:8,hp0:8,ac:13,sp:false,feat:["Sneak Attack 1d6 (2d6 at lv3)","Expertise (double prof on 2 skills)","Cunning Action (dash/disengage/hide as bonus)"],eq:["Rapier","Shortbow","20 Arrows","Leather Armor","Thieves' Tools"]},
  Cleric:{hd:8,hp0:8,ac:18,sp:true,cantrips:["Sacred Flame","Guidance","Thaumaturgy"],spells:["Cure Wounds","Bless","Guiding Bolt","Healing Word","Shield of Faith"],slots:2,feat:["Turn Undead","Life Domain (bonus healing)"],eq:["Mace","Scale Mail","Shield","Holy Symbol"]},
  Ranger:{hd:10,hp0:10,ac:14,sp:false,feat:["Favored Enemy (advantage on tracking)","Natural Explorer (no difficult terrain)","Archery +2 to ranged attacks"],eq:["Longbow","20 Arrows","Leather Armor","2 Shortswords"]},
  Paladin:{hd:10,hp0:10,ac:16,sp:false,feat:["Divine Sense (detect fiends/undead)","Lay on Hands (5hp per level pool)","Divine Smite (2d8 radiant on hit)"],eq:["Longsword","Shield","Chain Mail","Holy Symbol","5 Javelins"]},
};
// XP thresholds per level
const XP_TABLE=[0,300,900,2700,6500,14000,23000,34000,48000,64000];
const SLOT_TABLE=[[],[2],[3],[4,2],[4,3],[4,3,2]]; // spell slots by level index (1-5)

const ABS=["str","dex","con","int","wis","cha"];
const ABF={str:"Strength",dex:"Dexterity",con:"Constitution",int:"Intelligence",wis:"Wisdom",cha:"Charisma"};
const ARR=[15,14,13,12,10,8];
const mo=s=>Math.floor((s-10)/2);
const fm=s=>{const m=mo(s);return m>=0?"+"+m:""+m;};
const shuffle=a=>{const c=[...a];for(let i=c.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[c[i],c[j]]=[c[j],c[i]];}return c;};
const roll=sides=>Math.floor(Math.random()*sides)+1;
const NAMES=["Aldric","Vexia","Thorn","Mirael","Kragmar","Lysara","Durnok","Faelith","Grimbold","Seraphine","Azrak","Elowen","Mordecai","Nyxara","Theron"];
const LOOKS=["Scarred face, silver-streaked hair","Bright green eyes, freckled skin","Towering figure with braided beard","Slender with raven-black hair","Weathered skin, missing left ear","Pale with glowing amber eyes","Stocky, covered in tribal tattoos","Elegant with a permanent smirk"];

const $=id=>document.getElementById(id);
function el(tag,cls,children){const e=document.createElement(tag);if(cls)e.className=cls;if(children){if(!Array.isArray(children))children=[children];for(const c of children){if(typeof c==="string")e.appendChild(document.createTextNode(c));else if(c)e.appendChild(c);}}return e;}
function btn(text,cls,fn){const b=document.createElement("button");b.className=cls;b.textContent=text;b.addEventListener("click",fn);return b;}

// ══════════════════════════════
// STATE
// ══════════════════════════════
let S={
  screen:"menu",slotIdx:null,
  // creation
  step:0,race:"",cls:"",asgn:{str:"",dex:"",con:"",int:"",wis:"",cha:""},charName:"",charLook:"",charBack:"",
  // game
  char:null,msgs:[],log:[],input:"",loading:false,opts:[],combat:false,enemies:[],status:"",
  npcs:[],locations:["Unknown"],currentLoc:"Unknown",
  // dice
  diceState:null, // {desc,ability,target,type} or null
  diceResult:null, // {rolled,mod,total,target,hit}
  // death
  deathSaves:{succ:0,fail:0},dying:false,
  // level up
  pendingLevelUp:false
};

// ══════════════════════════════
// SAVE (3 SLOTS)
// ══════════════════════════════
function getSaves(){try{return JSON.parse(localStorage.getItem("dnd_saves")||"[null,null,null]");}catch(e){return[null,null,null];}}
function setSaves(saves){try{localStorage.setItem("dnd_saves",JSON.stringify(saves));}catch(e){}}
function saveSlot(idx){
  const saves=getSaves();
  saves[idx]={
    char:S.char,msgs:S.msgs.slice(-30),log:S.log,combat:S.combat,enemies:S.enemies,opts:S.opts,
    npcs:S.npcs,locations:S.locations,currentLoc:S.currentLoc,
    deathSaves:S.deathSaves,dying:S.dying,
    savedAt:new Date().toISOString()
  };
  setSaves(saves);
}
function loadSlot(idx){
  const saves=getSaves();
  const d=saves[idx];
  if(!d||!d.char)return false;
  S.char=d.char;S.msgs=d.msgs||[];S.log=d.log||[];S.combat=d.combat||false;S.enemies=d.enemies||[];S.opts=d.opts||[];
  S.npcs=d.npcs||[];S.locations=d.locations||["Unknown"];S.currentLoc=d.currentLoc||"Unknown";
  S.deathSaves=d.deathSaves||{succ:0,fail:0};S.dying=d.dying||false;
  S.slotIdx=idx;S.screen="game";S.diceState=null;S.diceResult=null;
  return true;
}
function deleteSlot(idx){const saves=getSaves();saves[idx]=null;setSaves(saves);}

// ══════════════════════════════
// LEVEL UP
// ══════════════════════════════
function getXPForNext(level){return XP_TABLE[level]||999999;}
function checkLevelUp(){
  const ch=S.char;
  const needed=getXPForNext(ch.level);
  if(ch.xp>=needed&&ch.level<10){
    ch.level++;
    const hpRoll=roll(CLASSES[ch.class].hd)+mo(ch.ab.con);
    const hpGain=Math.max(1,hpRoll);
    ch.maxHp+=hpGain;ch.hp+=hpGain;
    ch.prof=ch.level>=5?3:2;
    // Update spell slots
    if(ch.sp&&SLOT_TABLE[ch.level]){
      ch.slotMax=SLOT_TABLE[ch.level]||ch.slotMax;
    }
    S.pendingLevelUp=true;
    S.log.push({type:"system",text:"LEVEL UP! Now level "+ch.level+". +"+hpGain+" HP!"});
    return true;
  }
  return false;
}

// ══════════════════════════════
// REST
// ══════════════════════════════
function shortRest(){
  const ch=S.char;
  const hdHeal=roll(CLASSES[ch.class].hd)+mo(ch.ab.con);
  const healed=Math.min(hdHeal,ch.maxHp-ch.hp);
  ch.hp=Math.min(ch.maxHp,ch.hp+healed);
  S.msgs.push({role:"assistant",text:"⛺ Short Rest — You spend an hour resting. Healed "+healed+" HP. (Hit Die: d"+CLASSES[ch.class].hd+"+"+fm(ch.ab.con)+")"});
  S.log.push({type:"heal",text:"Short rest: +"+healed+" HP"});
  if(S.slotIdx!==null)saveSlot(S.slotIdx);
  render();
}
function longRest(){
  const ch=S.char;
  const oldHp=ch.hp;
  ch.hp=ch.maxHp;
  if(ch.sp){ch.slotsUsed=0;}
  S.deathSaves={succ:0,fail:0};S.dying=false;
  const healed=ch.hp-oldHp;
  S.msgs.push({role:"assistant",text:"🏕 Long Rest — You sleep for 8 hours. Fully healed"+(healed>0?" (+"+healed+" HP)":"")+". All spell slots restored. Death saves reset."});
  S.log.push({type:"heal",text:"Long rest: full HP restored"});
  if(S.slotIdx!==null)saveSlot(S.slotIdx);
  render();
}

// ══════════════════════════════
// API
// ══════════════════════════════
async function askDM(sys,messages,onStatus){
  onStatus("The Dungeon Master consults ancient tomes...");
  const res=await fetch("/api/dm",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({system:sys,messages})});
  onStatus("Reading the scrolls...");
  const data=await res.json();
  if(!res.ok)throw new Error(data.error||"API error "+res.status);
  return data;
}

// ══════════════════════════════
// HELPERS
// ══════════════════════════════
function bon(a){return S.race?(RACES[S.race].b[a]||0):0;}
function fin(a){return(S.asgn[a]!==""?Number(S.asgn[a]):10)+bon(a);}
function avail(ab){
  const used=ABS.filter(a=>a!==ab).map(a=>S.asgn[a]).filter(v=>v!=="").map(Number);
  const pool=[...ARR];for(const v of used){const i=pool.indexOf(v);if(i!==-1)pool.splice(i,1);}
  return[...new Set(pool)].sort((a,b)=>b-a);
}

// ══════════════════════════════
// GAME
// ══════════════════════════════
async function startGame(){await callDMAction("",true);}

async function callDMAction(userMsg,isInit){
  const ch=S.char,en=S.enemies,inC=S.combat;
  S.loading=true;S.opts=[];S.diceState=null;S.diceResult=null;render();

  const sys=`You are a D&D 5e DM. Medieval tone. Max 2-3 paragraphs. Vivid but concise.

PC: ${ch.name}, ${ch.race} ${ch.class} Lv${ch.level} HP:${ch.hp}/${ch.maxHp} AC:${ch.ac} Prof:+${ch.prof}
STR:${ch.ab.str}(${fm(ch.ab.str)}) DEX:${ch.ab.dex}(${fm(ch.ab.dex)}) CON:${ch.ab.con}(${fm(ch.ab.con)}) INT:${ch.ab.int}(${fm(ch.ab.int)}) WIS:${ch.ab.wis}(${fm(ch.ab.wis)}) CHA:${ch.ab.cha}(${fm(ch.ab.cha)})
Appearance: ${ch.look||"unknown"} Background: ${ch.back||"unknown"}
Features: ${ch.feat.join(",")}
${ch.sp?"Cantrips:"+ch.cantrips.join(",")+". Spells:"+ch.spells.join(",")+". Slots remaining:"+(ch.slotMax.reduce((a,b)=>a+b,0)-ch.slotsUsed):""}
Gear:${ch.inv.join(",")}, Gold:${ch.gold}gp, XP:${ch.xp}/${getXPForNext(ch.level)}
${en.length?"Enemies:"+en.map(e=>e.name+" "+e.hp+"/"+e.maxHp+"hp AC"+e.ac).join("; "):""}
${inC?"IN COMBAT":"EXPLORING"} Location:${S.currentLoc}
${S.npcs.length?"Known NPCs:"+S.npcs.join(", "):""}
${S.dying?"DYING - needs death saves or healing!":""}

RULES:
- When PC needs to make an ability check, attack roll, or saving throw, include a "roll" field in your JSON
- You handle enemy rolls yourself and show them
- Use 5e rules strictly. Track initiative in combat.
- Award XP after defeating enemies (25-100 per enemy based on difficulty)
- Introduce NPCs by name. Remember them.
- Mention the current location name.

Reply ONLY JSON:
{"narrative":"story text. Show enemy rolls inline like [Goblin attacks: d20:14+3=17 vs AC 17, HIT! 1d6+1=4 damage]","roll":{"desc":"Swing your longsword at the goblin","ability":"str","target":13,"type":"attack"},"log":[{"type":"combat","text":"x"}],"changes":{"hpChange":0,"goldChange":0,"addItems":[],"removeItems":[],"xp":0,"slotUsed":false,"combat":false,"enemies":[],"addConditions":[],"removeConditions":[],"newNPCs":[],"location":""},"options":["A","B","C"]}

"roll" is null when no player roll needed. When roll IS needed, do NOT resolve the outcome yet — wait for the player's roll result.`;

  const apiMsgs=isInit
    ?[{role:"user",content:"Begin a dramatic medieval D&D adventure! Describe where I am, introduce an NPC, and give me a hook. Mention my appearance: "+ch.look}]
    :[...S.msgs.slice(-10).map(m=>({role:m.role,content:m.text})),{role:"user",content:userMsg}];

  try{
    const parsed=await askDM(sys,apiMsgs,s=>{S.status=s;render();});
    S.status="";
    const sc=parsed.changes||{};
    if(sc.hpChange){ch.hp=Math.max(0,Math.min(ch.maxHp,ch.hp+sc.hpChange));if(ch.hp===0&&!S.dying){S.dying=true;S.deathSaves={succ:0,fail:0};}}
    if(sc.goldChange)ch.gold=Math.max(0,ch.gold+sc.goldChange);
    if(sc.addItems?.length)ch.inv.push(...sc.addItems);
    if(sc.removeItems?.length)ch.inv=ch.inv.filter(x=>!sc.removeItems.includes(x));
    if(sc.xp){ch.xp+=sc.xp;checkLevelUp();}
    if(sc.slotUsed&&ch.slotsUsed<ch.slotMax.reduce((a,b)=>a+b,0))ch.slotsUsed++;
    if(sc.addConditions?.length)ch.cond=[...new Set([...ch.cond,...sc.addConditions])];
    if(sc.removeConditions?.length)ch.cond=ch.cond.filter(x=>!sc.removeConditions.includes(x));
    if(sc.combat!==undefined)S.combat=sc.combat;
    if(sc.enemies)S.enemies=sc.enemies;
    if(sc.newNPCs?.length)S.npcs=[...new Set([...S.npcs,...sc.newNPCs])];
    if(sc.location&&sc.location!==""){S.currentLoc=sc.location;if(!S.locations.includes(sc.location))S.locations.push(sc.location);}
    if(parsed.log?.length)S.log=S.log.concat(parsed.log).slice(-50);
    if(!isInit)S.msgs.push({role:"user",text:userMsg});
    S.msgs.push({role:"assistant",text:parsed.narrative||"The DM nods silently..."});

    // Check if DM wants a roll
    if(parsed.roll&&parsed.roll.desc){
      S.diceState=parsed.roll;
      S.opts=[];
    } else {
      S.opts=parsed.options||["Look around","Move forward","Check inventory"];
    }
    if(S.slotIdx!==null)saveSlot(S.slotIdx);
  }catch(err){
    S.status="";
    S.msgs.push({role:"assistant",text:"⚠ "+err.message});
    S.opts=["Retry"];
  }
  S.loading=false;render();
  setTimeout(()=>{const n=document.querySelector(".nar");if(n)n.scrollTop=n.scrollHeight;},60);
}

function handleAction(text){
  if(text==="Start Over"){deleteSlot(S.slotIdx);S.screen="menu";render();return;}
  if(text==="Retry"){S.msgs=S.msgs.filter(m=>!m.text.startsWith("⚠"));callDMAction("",true);return;}
  S.input="";callDMAction(text,false);
}
function doSubmit(){const t=S.input.trim();if(t&&!S.loading){S.input="";callDMAction(t,false);}}

function rollDice(){
  const ds=S.diceState;if(!ds)return;
  const d20=roll(20);
  const abilMod=mo(S.char.ab[ds.ability]||10);
  const profBonus=(ds.type==="attack"||ds.type==="save")?S.char.prof:0;
  const total=d20+abilMod+profBonus;
  const hit=total>=ds.target;
  const crit=d20===20;
  S.diceResult={rolled:d20,mod:abilMod+profBonus,total,target:ds.target,hit:crit||hit,crit,fumble:d20===1};

  // Animate then send result
  const diceBtn=document.querySelector(".dice-btn");
  if(diceBtn){diceBtn.classList.add("rolling");diceBtn.textContent=d20;}

  setTimeout(()=>{
    render();
    // Send result to DM
    const resultText=`I rolled a ${d20} on the d20. With my ${ABF[ds.ability]} modifier (${fm(abilMod)}) and proficiency (+${profBonus}), total is ${total} vs target ${ds.target}. ${S.diceResult.crit?"NATURAL 20! CRITICAL HIT!":S.diceResult.fumble?"NATURAL 1! CRITICAL MISS!":S.diceResult.hit?"That's a HIT!":"That's a MISS."} Continue the story.`;
    S.diceState=null;
    setTimeout(()=>callDMAction(resultText,false),800);
  },500);
}

function doDeathSave(){
  const d=roll(20);
  if(d===20){S.dying=false;S.char.hp=1;S.deathSaves={succ:0,fail:0};S.msgs.push({role:"assistant",text:"🎲 Death Save: Natural 20! You regain consciousness with 1 HP!"});S.log.push({type:"heal",text:"Nat 20 death save — stabilized at 1 HP"});}
  else if(d===1){S.deathSaves.fail+=2;S.msgs.push({role:"assistant",text:"🎲 Death Save: Natural 1! Two failures. ("+S.deathSaves.fail+"/3 failures)"});}
  else if(d>=10){S.deathSaves.succ++;S.msgs.push({role:"assistant",text:"🎲 Death Save: Rolled "+d+" — Success! ("+S.deathSaves.succ+"/3 successes)"});}
  else{S.deathSaves.fail++;S.msgs.push({role:"assistant",text:"🎲 Death Save: Rolled "+d+" — Failure! ("+S.deathSaves.fail+"/3 failures)"});}

  if(S.deathSaves.succ>=3){S.dying=false;S.deathSaves={succ:0,fail:0};S.msgs.push({role:"assistant",text:"You stabilize! You are unconscious but no longer dying."});S.log.push({type:"heal",text:"Stabilized by death saves"});}
  if(S.deathSaves.fail>=3){S.msgs.push({role:"assistant",text:"💀 Three failures. Your hero has fallen. May they find peace in the halls beyond."});S.log.push({type:"system",text:S.char.name+" has died."});S.opts=["Start Over"];}
  if(S.slotIdx!==null)saveSlot(S.slotIdx);
  render();
}

  const ch=S.char;const hp=ch.maxHp>0?(ch.hp/ch.maxHp)*100:0;

  // HP
  const hr=el("div","");hr.style.cssText="display:flex;justify-content:space-between;font-size:0.85rem;margin-bottom:3px;color:var(--text2)";

  ht.appendChild(hf);sd.appendChild(ht);

  // XP bar
  const xpNeeded=getXPForNext(ch.level);const xpPct=Math.min(100,(ch.xp/xpNeeded)*100);
  const xpLabel=el("div","");xpLabel.style.cssText="display:flex;justify-content:space-between;font-size:0.78rem;color:var(--dim)";
  xpLabel.innerHTML='<span>XP</span><span>'+ch.xp+'/'+xpNeeded+'</span>';
  sd.appendChild(xpLabel);
  const xpBar=el("div","xpbar");const xpFill=document.createElement("div");xpFill.className="xpfill";xpFill.style.width=xpPct+"%";xpBar.appendChild(xpFill);sd.appendChild(xpBar);

  // Death saves
  if(S.dying){
    const dp=el("div","death-panel");
    dp.appendChild(el("div","death-title",["☠ DYING"]));
    const dr=el("div","death-row");
    const succ=el("div","death-saves");succ.appendChild(el("span","label",["Pass"]));
    for(let i=0;i<3;i++){const d=document.createElement("div");d.className="death-dot succ"+(i<S.deathSaves.succ?" filled":"");succ.appendChild(d);}
    const fail=el("div","death-saves");fail.appendChild(el("span","label",["Fail"]));
    for(let i=0;i<3;i++){const d=document.createElement("div");d.className="death-dot fail"+(i<S.deathSaves.fail?" filled":"");fail.appendChild(d);}
    dr.appendChild(succ);dr.appendChild(fail);dp.appendChild(dr);
    if(S.deathSaves.fail<3)dp.appendChild(btn("🎲 Roll Death Save","bp",doDeathSave));
    sd.appendChild(dp);
  }

  // Rest buttons
  if(!S.combat&&!S.dying){
    const rr=el("div","rest-row");
    rr.appendChild(btn("⛺ Short Rest","rest-btn",shortRest));
    rr.appendChild(btn("🏕 Long Rest","rest-btn",longRest));
    sd.appendChild(rr);
  }

  // Mini stats
  const ms=el("div","minirow");
  for(const[l,v]of[["AC",ch.ac],["SPD",ch.spd],["PROF","+"+ch.prof]]){const d=el("div","mini");d.innerHTML='<div class="l">'+l+'</div><div class="v">'+v+'</div>';ms.appendChild(d);}
  sd.appendChild(ms);

  // Abilities
  const ag=el("div","abgrid");
  for(const a of ABS){const d=el("div","abbox");d.innerHTML='<div class="l">'+a.toUpperCase()+'</div><div class="v">'+ch.ab[a]+'</div><div class="m">'+fm(ch.ab[a])+'</div>';ag.appendChild(d);}
  sd.appendChild(ag);

  // Powers
  sd.appendChild(el("div","label",["Powers & Features"]));
  const pw=el("div","powers");
  for(const f of ch.feat)pw.appendChild(el("div","power",["⚔ "+f]));
  if(ch.cantrips?.length){pw.appendChild(el("div","",["— Cantrips —"])).style.cssText="font-size:0.75rem;color:var(--dim);margin-top:4px";for(const c of ch.cantrips)pw.appendChild(el("div","cantrip",["✦ "+c]));}
  if(ch.spells?.length){
    const totalSlots=ch.slotMax.reduce((a,b)=>a+b,0);const remaining=totalSlots-ch.slotsUsed;
    pw.appendChild(el("div","",["— Spells ("+remaining+"/"+totalSlots+" slots) —"])).style.cssText="font-size:0.75rem;color:var(--dim);margin-top:4px";
    for(const s of ch.spells)pw.appendChild(el("div","spell",["◆ "+s]));
  }
  sd.appendChild(pw);

  sd.appendChild(el("div","dv"));
  sd.appendChild(el("div","label",["Gold"]));sd.appendChild(el("div","val",[ch.gold+" gp"]));
  sd.appendChild(el("div","dv"));
  sd.appendChild(el("div","label",["Equipment"]));
  for(const item of ch.inv)sd.appendChild(el("div","item",["• "+item]));

  if(ch.cond?.length){sd.appendChild(el("div","dv"));sd.appendChild(el("div","label",["Conditions"]));
    const cv=el("div","");cv.style.cssText="color:var(--red);font-size:0.88rem";cv.textContent=ch.cond.join(", ");sd.appendChild(cv);}

  // NPCs
  if(S.npcs.length){sd.appendChild(el("div","dv"));sd.appendChild(el("div","label",["Known NPCs"]));for(const n of S.npcs)sd.appendChild(el("div","npc",["👤 "+n]));}

  // Location
  sd.appendChild(el("div","dv"));sd.appendChild(el("div","label",["Location"]));
  const loc=el("div","val",[S.currentLoc]);loc.style.fontSize="0.9rem";sd.appendChild(loc);

  // Log
  if(S.log.length){
    sd.appendChild(el("div","dv"));sd.appendChild(el("div","label",["Chronicle"]));
    const lw=document.createElement("div");lw.style.cssText="max-height:130px;overflow-y:auto";
    for(const l of S.log.slice(-8)){const e=el("div","",[ l.text ]);e.style.cssText="font-size:0.82rem;padding:2px 0;color:"+(l.type==="combat"?"var(--red)":l.type==="heal"?"var(--grn)":l.type==="loot"?"var(--purp)":"var(--dim)");lw.appendChild(e);}
    sd.appendChild(lw);
  }

  // Menu button
  sd.appendChild(el("div","dv"));
  sd.appendChild(btn("← Save & Exit","bs",()=>{if(S.slotIdx!==null)saveSlot(S.slotIdx);S.screen="menu";render();}));

  wrap.appendChild(sd);

  // ── MAIN PANEL ──
  const mp=el("div","mp");

  if(S.combat){
    const cb=el("div","combat");
    let html="⚔ COMBAT ⚔";
    if(S.enemies.length)html+='<div class="foes">'+S.enemies.map(e=>e.name+": "+e.hp+"/"+e.maxHp+"hp AC"+e.ac).join(" • ")+'</div>';
    cb.innerHTML=html;mp.appendChild(cb);
  }

  if(S.pendingLevelUp){
    const lu=el("div","lvlup");lu.style.margin="0.7rem 1.4rem 0";
    lu.appendChild(el("div","lvlup-title",["⬆ LEVEL UP! Level "+ch.level+" reached!"]));
    lu.appendChild(el("div","",["HP increased! New abilities may be available."]));lu.lastChild.style.cssText="color:var(--text2);font-size:0.92rem;margin-top:4px";
    lu.appendChild(btn("Dismiss","bs",()=>{S.pendingLevelUp=false;render();}));
    mp.appendChild(lu);
  }

  // Narrative
  const nar=el("div","nar");
  if(!S.msgs.length&&!S.loading&&!S.status){
    const ph=el("div","",["Thy quest awaits..."]);ph.style.cssText="color:var(--dim);text-align:center;margin-top:3rem;font-family:var(--f1);font-size:1.1rem";nar.appendChild(ph);
  }
  for(const m of S.msgs){
    if(m.role==="user"&&!m.text.startsWith("I rolled a ")){
      const d=el("div","user-msg");d.appendChild(el("div","user-tag",["THY ACTION"]));
      const t=el("div","",[ m.text ]);t.style.cssText="white-space:pre-wrap;color:var(--text)";d.appendChild(t);nar.appendChild(d);
    } else if(m.role==="assistant"){
      const d=el("div","dm-msg");d.style.whiteSpace="pre-wrap";d.textContent=m.text;nar.appendChild(d);
    }
  }

  // Dice panel
  if(S.diceState&&!S.diceResult&&!S.loading){
    const ds=S.diceState;
    const dp=el("div","dice-panel");
    dp.appendChild(el("div","dice-desc",[ds.desc]));
    const abilMod=mo(S.char.ab[ds.ability]||10);
    const profBonus=(ds.type==="attack"||ds.type==="save")?S.char.prof:0;
    dp.appendChild(el("div","dice-target",["Need: "+ds.target+" | Your modifier: "+ABF[ds.ability]+" ("+fm(abilMod)+")"+(profBonus?(" + Prof (+"+profBonus+")"):"")+" = "+fm(abilMod+profBonus)]));
    const db=btn("🎲","dice-btn",rollDice);
    dp.appendChild(db);
    const hint=el("div","",["Click to roll d20"]);hint.style.cssText="color:var(--dim);font-size:0.88rem;margin-top:0.5rem";dp.appendChild(hint);
    nar.appendChild(dp);
  }

  if(S.diceResult&&!S.loading){
    const dr=S.diceResult;
    const dp=el("div","dice-panel");
    dp.appendChild(el("div","dice-desc",[S.diceState?S.diceState.desc:"Roll Result"]));
    const numClass="dice-roll-num"+(dr.crit?" crit":dr.hit?" hit":" miss");
    dp.appendChild(el("div",numClass,[ String(dr.rolled) ]));
    dp.appendChild(el("div","dice-detail",["d20: "+dr.rolled+" + modifier: "+dr.mod+" = "+dr.total+" vs target "+dr.target]));
    const outcome=dr.crit?"⚡ CRITICAL HIT!":dr.fumble?"💀 CRITICAL MISS!":dr.hit?"✓ HIT!":"✗ MISS!";
    const oc=el("div","dice-outcome"+(dr.hit?" hit":" miss"),[ outcome ]);dp.appendChild(oc);
    dp.appendChild(el("div","status",["DM is resolving the outcome..."]));
    nar.appendChild(dp);
  }

  if(S.loading||S.status){nar.appendChild(el("div","status",[S.status||"The DM weaves fate..."]));}
  if(!S.loading&&S.opts.length&&!S.diceState){
    const or=el("div","opts");
    for(const o of S.opts)or.appendChild(btn(o,"optbtn",()=>handleAction(o)));
    nar.appendChild(or);
  }
  mp.appendChild(nar);

  // Input
  const ia=el("div","ia");
  const ta=document.createElement("textarea");ta.className="ti";ta.rows=2;ta.placeholder="Declare thy action...";ta.value=S.input;
  if(S.loading||S.diceState)ta.disabled=true;
  ta.addEventListener("input",e=>{S.input=e.target.value;});
  ta.addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();doSubmit();}});
  ia.appendChild(ta);
  const sb=btn("⚔","bp",doSubmit);sb.style.cssText="padding:0.5rem 1.1rem;font-size:1rem;align-self:flex-end";
  if(S.loading||S.diceState)sb.disabled=true;
  ia.appendChild(sb);
  mp.appendChild(ia);

  wrap.appendChild(mp);app.appendChild(wrap);
  setTimeout(()=>{const n=document.querySelector(".nar");if(n)n.scrollTop=n.scrollHeight;},30);
}

// ══════════════════════════════
// BOOT
// ══════════════════════════════
render();
</script>
</body>
</html>
